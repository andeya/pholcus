crawlcap   = 50
phantomjs  = pholcus_pkg/phantomjs
proxylib   = pholcus_pkg/proxy.lib
spiderdir  = dyn_rules
fileoutdir = pholcus_pkg/file_out
textoutdir = pholcus_pkg/text_out
dbname     = pholcus

[mgo]
connstring   = 127.0.0.1:27017
conncap      = 1024
conngcsecond = 600

[mysql]
connstring       = root:@tcp(127.0.0.1:3306)
conncap          = 2048
maxallowedpacket = 1048576

[beanstalkd]
host = localhost:11300
tube = pholcus

[kafka]
brokers = 127.0.0.1:9092

[log]
cap           = 10000
level         = debug
consolelevel  = info
feedbacklevel = error
lineinfo      = false
save          = true

[run]
mode        = -1
port        = 2015
master      = 127.0.0.1
thread      = 20
pause       = 300
outtype     = csv
batchcap    = 10000
limit       = 0
proxyminute = 0
success     = true
failure     = true
